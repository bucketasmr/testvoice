<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Video & Paint Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #181825;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #313244;
            position: relative;
        }
        .lang-switcher {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .lang-btn {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 12px;
            margin-left: 5px;
        }
        .lang-btn:hover {
            background: #45475a;
        }
        .badge {
            background: #f38ba8;
            color: #11111b;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #cdd6f4;
        }
        .status-box {
            background: #11111b;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
            border: 1px solid #313244;
            color: #a6e3a1;
        }
        
        /* Сетка для видео-стримов (локальный и удаленный) */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #11111b;
            border-radius: 12px;
            border: 2px solid #45475a;
            object-fit: cover;
            transform: scaleX(-1); /* Зеркальное отображение для удобства */
        }
        
        .btn {
            background: #89b4fa;
            color: #11111b;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #b4befe;
        }
        .btn:disabled {
            background: #45475a;
            color: #7f849c;
            cursor: not-allowed;
        }
        
        /* Панель управления стримом */
        .controls {
            display: none;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            flex-wrap: wrap;
        }
        .controls .btn-control {
            flex: 1;
            min-width: 100px;
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .controls .btn-control:hover {
            background: #45475a;
        }
        .controls .btn-danger {
            background: #f38ba8;
            color: #11111b;
        }
        
        /* Интегрированный блок текстового чата */
        .chat-container {
            display: none;
            flex-direction: column;
            background: #1e1e2e;
            border: 1px solid #313244;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            height: 250px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            background: #11111b;
            text-align: left;
        }
        .chat-msg {
            word-break: break-word;
            line-height: 1.4;
        }
        .chat-input-row {
            display: flex;
            border-top: 1px solid #313244;
            background: #1e1e2e;
        }
        #chatInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: #cdd6f4;
            font-size: 14px;
            outline: none;
        }
        .chat-send-btn {
            background: #89b4fa;
            color: #11111b;
            border: none;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Контейнер графического холста */
        .paint-container {
            display: none;
            background: #1e1e2e;
            border: 1px solid #313244;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .paint-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .paint-toolbar input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }
        .paint-toolbar input[type="range"] {
            width: 70px;
            accent-color: #89b4fa;
        }
        .history-btn {
            background: #313244;
            border: 1px solid #45475a;
            color: #cdd6f4;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .clear-btn {
            background: #f38ba8;
            color: #11111b;
            font-weight: bold;
        }
        canvas {
            background: #ffffff;
            border-radius: 8px;
            width: 100%;
            height: 300px;
            cursor: crosshair;
            touch-action: none;
        }
        
        /* Всплывающие оверлеи авторизации */
        .overlay-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 27, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-box {
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 16px;
            padding: 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .modal-box input[type="text"] {
            width: 100%;
            background: #11111b;
            border: 1px solid #45475a;
            padding: 12px;
            border-radius: 8px;
            color: #cdd6f4;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }
        
        /* Лог Консоль разработки */
        .toggle-log-btn {
            background: transparent;
            border: 1px solid #313244;
            color: #6c7086;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 25px;
            transition: color 0.2s;
        }
        .toggle-log-btn:hover {
            color: #cdd6f4;
            border-color: #45475a;
        }
        .log-section {
            display: none;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            text-align: left;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .log-title {
            font-size: 12px;
            color: #6c7086;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .copy-btn {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
        .log-container {
            height: 150px;
            background: #11111b;
            border: 1px solid #313244;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #cdd6f4;
        }
        .log-line { margin-bottom: 4px; line-height: 1.3; }
        .log-info { color: #cdd6f4; }
        .log-ok { color: #a6e3a1; }
        .log-error { color: #f38ba8; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="uk">UK</button>
            <button class="lang-btn" data-lang="ru">RU</button>
        </div>

        <div class="badge">Room: World Wide</div>
        <h1>Global Video & Paint Chat</h1>
        
        <div id="statusText" class="status-box">Click button to connect...</div>
        
        <button id="joinBtn" class="btn">Join Room</button>

        <div id="videoGrid" class="video-grid">
            <video id="localVideo" autoplay playsinline webkit-playsinline muted></video>
        </div>

        <div class="controls">
            <button id="muteBtn" class="btn-control">Mute Mic</button>
            <button id="camOffBtn" class="btn-control">Turn Cam Off</button>
            <button id="flipCamBtn" class="btn-control">🔄 Flip</button>
            <button id="hostResetBtn" class="btn-control btn-danger">⚠️ Reset Room</button>
        </div>
    </div>

    <div id="chatContainer" class="chat-container">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500">
            <button id="sendMsgBtn" class="chat-send-btn">Send</button>
        </div>
    </div>

    <div id="paintContainer" class="paint-container">
        <div class="paint-toolbar">
            <div class="tool-group">
                <input type="color" id="brushColor" value="#1e1e2e">
                <input type="range" id="brushSize" min="1" max="40" value="5">
                <input type="range" id="brushOpacity" min="0.1" max="1.0" step="0.1" value="1.0">
            </div>
            <div class="tool-group">
                <button id="undoBtn" class="history-btn">↶</button>
                <button id="redoBtn" class="history-btn">↷</button>
                <button id="clearBtn" class="history-btn clear-btn">🗑️ Clear</button>
            </div>
        </div>
        <canvas id="paintCanvas" width="800" height="600"></canvas>
    </div>

    <button id="toggleLogBtn" class="toggle-log-btn">Show Console Logs</button>
    
    <div id="remoteMediaContainer" style="display: none;"></div>
    
    <div id="logSection" class="log-section">
        <div class="log-header">
            <div class="log-title">Console Logs</div>
            <button id="copyLogBtn" class="copy-btn">Copy Logs</button>
        </div>
        <div id="log" class="log-container"></div>
    </div>

    <div id="nameSetupOverlay" class="overlay-modal" style="display: none;">
        <div class="modal-box">
            <h3 id="txt-name-prompt" style="margin-top:0; margin-bottom:15px;">Enter your nickname to start:</h3>
            <input type="text" id="usernameInput" placeholder="Your name..." maxlength="25">
            <button id="saveNameBtn" class="btn">Join Room</button>
        </div>
    </div>

    <div id="audioActivationOverlay" class="overlay-modal" style="display: none;">
        <div class="modal-box">
            <p id="txt-modal-alert" style="margin-top:0; margin-bottom:20px;">Your browser blocked background audio. Click to activate stream.</p>
            <button id="audioActivateBtn" class="btn">Unmute Audio</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
