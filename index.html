<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket Tennis 2D 1st Person</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #111; color: #fff; font-family: sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        button { background: #007aff; border: none; color: white; padding: 15px 32px; font-size: 16px; margin: 10px 0; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; text-align: center; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; background: #1a3c1a; }
        #status { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 18px; z-index: 5; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    </style>
    <!-- Подключаем PeerJS для мультиплеера -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="status">Ожидание создания игры...</div>

    <div id="menu">
        <h2>Rocket Tennis</h2>
        <p style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Стиль Rocket League от 1-го лица</p>
        <button id="btnCreate">Создать комнату (Игрок 1)</button>
        <hr style="border-color: #333; margin: 10px 0;">
        <input type="text" id="peerIdInput" placeholder="Вставь ID создателя сюда">
        <button id="btnJoin" style="background: #34c759;">Подключиться (Игрок 2)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="multiplayer.js"></script>
    <script src="game.js"></script>
</body>
</html>
