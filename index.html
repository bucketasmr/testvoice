<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iOS Screen Streamer</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #121212; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #container { text-align: center; width: 90%; max-width: 500px; }
        button {
            background: #007aff; color: white; border: none;
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            border-radius: 12px; cursor: pointer; width: 100%;
            margin-top: 20px; box-shadow: 0 4px 15px rgba(0,122,255,0.4);
        }
        button:active { transform: scale(0.98); }
        video {
            width: 100%; height: auto; max-height: 85vh;
            border-radius: 12px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .status { font-size: 14px; color: #aaa; margin-top: 10px; }
        .hidden { display: none !important; }
        #roomInfo { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; word-break: break-all; }
    </style>
</head>
<body>

<div id="container">
    <div id="streamerMode" class="hidden">
        <h2>Трансляция экрана</h2>
        <div id="roomInfo">Подключение к серверу...</div>
        <video id="localPreview" autoplay playsinline muted></video>
        <button id="startBtn">Запустить трансляцию</button>
        <div id="streamerStatus" class="status">Ожидание запуска...</div>
    </div>

    <div id="viewerMode" class="hidden">
        <video id="remoteVideo" autoplay playsinline controls></video>
        <div id="viewerStatus" class="status">Ожидание стримера...</div>
    </div>
</div>

<script>
// --- КОНФИГУРАЦИЯ ---
// Используем публичный бесплатный брокер для сигналинга
const MQTT_BROKER = 'wss://broker.hivemq.com:8000/mqtt';
// Уникальный префикс для твоих комнат, чтобы никто чужой не подключился
const TOPIC_PREFIX = 'my_secret_ios_stream_'; 

// Автоматически определяем ID комнаты из URL (?room=имя) или создаем статическую "default"
const urlParams = new URLSearchParams(window.location.search);
const roomId = urlParams.get('room') || 'main_session';
const topic = TOPIC_PREFIX + roomId;

let client, pc;
let localStream = null;

// Оптимальные настройки для iOS: режем FPS и разрешение ради экономии батареи и работы в фоне
const streamConstraints = {
    video: {
        width: { ideal: 854 },   // 480p/720p вполне хватит для контроля интерфейса
        height: { ideal: 480 },
        frameRate: { ideal: 5, max: 10 } // Зарезаем до 5-10 кадров для разгрузки процессора
    },
    audio: false // Звук отключаем, чтобы не висел канал
};

const rtcConfig = {
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] // Бесплатный STUN от Google
};

// --- ОПРЕДЕЛЕНИЕ РЕЖИМА ---
// Если в URL есть параметр ?view=1, это зритель. Если нет — это стример.
const isViewer = urlParams.get('view') === '1';

if (isViewer) {
    document.getElementById('viewerMode').classList.remove('hidden');
    initViewer();
} else {
    document.getElementById('streamerMode').classList.remove('hidden');
    const viewerUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}&view=1`;
    document.getElementById('roomInfo').innerHTML = `Ссылка для просмотра на ПК:<br><a href="${viewerUrl}" target="_blank" style="color:#007aff">${viewerUrl}</a>`;
    initStreamer();
}

// --- СИГНАЛИНГ ЧЕРЕЗ MQTT ---
function initMQTT(onMessageCallback) {
    client = mqtt.connect(MQTT_BROKER);
    client.on('connect', () => {
        client.subscribe(topic);
        console.log('Подключено к сигналингу комнаты:', roomId);
    });
    client.on('message', (t, message) => {
        const data = JSON.parse(message.toString());
        // Игнорируем сообщения от самих себя
        if (data.sender === (isViewer ? 'viewer' : 'streamer')) return;
        onMessageCallback(data);
    });
}

function sendSignal(payload) {
    payload.sender = isViewer ? 'viewer' : 'streamer';
    if (client && client.connected) {
        client.publish(topic, JSON.stringify(payload));
    }
}

// --- ЛОГИКА СТРИМЕРА (IPHONE) ---
function initStreamer() {
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('streamerStatus');

    initMQTT((data) => {
        if (data.type === 'viewer_ready' && localStream) {
            statusDiv.innerText = "Зритель подключился. Создаем соединение...";
            createPeerConnection();
        } else if (data.candidate && pc) {
            pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => console.error(e));
        } else if (data.answer && pc) {
            pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            statusDiv.innerText = "Трансляция успешно идет на ПК!";
        }
    });

    startBtn.addEventListener('click', async () => {
        try {
            statusDiv.innerText = "Запрос разрешения на запись экрана...";
            // На iOS в PWA режиме вызывает системное окно шеринга экрана
            localStream = await navigator.mediaDevices.getDisplayMedia(streamConstraints);
            document.getElementById('localPreview').srcObject = localStream;
            statusDiv.innerText = "Экран захвачен. Открой ссылку на ПК.";
            
            // Сигнализируем, что мы готовы раздавать
            sendSignal({ type: 'streamer_ready' });
        } catch (err) {
            statusDiv.innerText = "Ошибка захвата: " + err.message;
            console.error(err);
        }
    });
}

function createPeerConnection() {
    if (pc) pc.close();
    pc = new RTCPeerConnection(rtcConfig);

    // Добавляем треки экрана в WebRTC канал
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.onicecandidate = (event) => {
        if (event.candidate) sendSignal({ candidate: event.candidate });
    };

    pc.createOffer({ offerToReceiveVideo: false })
        .then(offer => pc.setLocalDescription(offer))
        .then(() => sendSignal({ offer: pc.localDescription }))
        .catch(e => console.error(e));
}

// --- ЛОГИКА ЗРИТЕЛЯ (WINDOWS / ДРУГОЙ ПК) ---
function initViewer() {
    const statusDiv = document.getElementById('viewerStatus');
    const remoteVideo = document.getElementById('remoteVideo');

    initMQTT(async (data) => {
        if (data.type === 'streamer_ready') {
            statusDiv.innerText = "Стример в сети. Запрашиваем подключение...";
            sendSignal({ type: 'viewer_ready' });
        } else if (data.offer) {
            statusDiv.innerText = "Получен поток, подключаемся...";
            pc = new RTCPeerConnection(rtcConfig);

            pc.onicecandidate = (event) => {
                if (event.candidate) sendSignal({ candidate: event.candidate });
            };

            pc.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                statusDiv.innerText = "Трансляция активна!";
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendSignal({ answer: pc.localDescription });
        } else if (data.candidate && pc) {
            pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => console.error(e));
        }
    });

    // Сразу сообщаем при заходе на страницу, вдруг стример уже ждет
    setTimeout(() => { sendSignal({ type: 'viewer_ready' }); }, 2000);
}
</script>

</body>
</html>
