<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Экрана iOS (WHIP/WebRTC)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0; padding: 20px;
            background: #0f0f12; color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 900px; display: grid;
            grid-template-columns: 1fr; gap: 20px; margin-top: 10px;
        }
        @media (min-width: 768px) {
            .container { grid-template-columns: 350px 1fr; }
        }
        .panel {
            background: #18181b; border: 1px solid #27272a;
            border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        h2, h3 { margin: 0; color: #fff; }
        .btn {
            background: #2563eb; color: #fff; border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #3f3f46; }
        .btn-secondary:hover { background: #52525b; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #a1a1aa; text-transform: uppercase; font-weight: 700; }
        input {
            background: #09090b; border: 1px solid #27272a; color: #fff;
            padding: 10px; border-radius: 6px; font-family: monospace; font-size: 13px;
        }
        #qrcode {
            background: #fff; padding: 10px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            margin: 10px auto; width: 200px; height: 200px;
        }
        .video-box {
            background: #000; border-radius: 16px; overflow: hidden;
            border: 1px solid #27272a; aspect-ratio: 9 / 16; max-height: 80vh;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        video { width: 100%; height: 100%; object-fit: contain; }
        .status-badge {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6);
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
            backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 5px;">Control Panel</h2>
    <p style="color:#71717a; margin: 0 0 15px 0; font-size: 14px;">Низкозадержечный WebRTC плеер экрана для iOS</p>

    <div class="container">
        <div class="panel">
            <h3>1. Настройка iPhone</h3>
            
            <div id="qrcode"></div>
            
            <button class="btn btn-secondary" onclick="copyStreamUrl()">📋 Скопировать URL (WHIP)</button>

            <div class="input-group">
                <label>Инфо для ручного ввода в Prism/Larix:</label>
                <input type="text" id="streamUrlField" readonly>
            </div>
            
            <hr style="border-color: #27272a; width: 100%; margin: 5px 0;">
            
            <h3>2. Управление плеером</h3>
            <button class="btn" onclick="startPlayer()">▶️ Подключиться к стриму</button>
        </div>

        <div class="video-box">
            <div class="status-badge" id="statusText">Ожидание потока...</div>
            <video id="remoteVideo" autoplay playsinline controls muted></video>
        </div>
    </div>

<script>
// Генерация случайного ID сессии, чтобы стримы не пересекались
const streamId = 'ios_cam_' + Math.random().toString(36).substring(2, 10);

// Используем бесплатный и быстрый глобальный WHIP/WHEP медиасервер от Cloudflare / Cloudflare-подобных инфраструктур
// Для автономности используем надежный публичный инстанс (Whip/Whep сервис)
const WHIP_URL = `https://bctls.io/whip/${streamId}`;
const WHEP_URL = `https://bctls.io/whep/${streamId}`;

// Заполняем поле текстом
document.getElementById('streamUrlField').value = WHIP_URL;

// Генерируем QR-код для приложения на iPhone
new QRCode(document.getElementById("qrcode"), {
    text: WHIP_URL,
    width: 200,
    height: 200,
    colorDark : "#000000",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.L
});

// Функция копирования ссылки в буфер
function copyStreamUrl() {
    const input = document.getElementById('streamUrlField');
    input.select();
    document.execCommand('copy');
    alert('Ссылка WHIP скопирована! Вставь её в настройки Prism Live или Larix.');
}

// ЛОГИКА ПЛЕЕРА (WHEP WebRTC)
async function startPlayer() {
    const videoElement = document.getElementById('remoteVideo');
    const statusText = document.getElementById('statusText');
    statusText.innerText = "Подключение к серверу...";

    const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    // Ожидаем входящие треки от медиасервера
    pc.ontrack = (event) => {
        if (event.streams && event.streams[0]) {
            videoElement.srcObject = event.streams[0];
            statusText.innerText = "🔴 ТРАНСЛЯЦИЯ АКТИВНА";
            statusText.style.color = "#ef4444";
        }
    };

    // Запрашиваем только видео
    pc.addTransceiver('video', { direction: 'recvonly' });

    try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Обмениваемся SDP с сервером по протоколу WHEP
        const response = await fetch(WHEP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: offer.sdp
        });

        if (!response.ok) throw new Error('Сервер не ответил на запрос WHEP');

        const answerSdp = await response.text();
        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answerSdp }));
        
    } catch (e) {
        console.error(e);
        statusText.innerText = "Ошибка подключения. Проверь, запущен ли стрим.";
        statusText.style.color = "#f43f5e";
    }
}
</script>
</body>
</html>
