<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Экрана iOS (RTMP-WebRTC)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0; padding: 20px;
            background: #0f0f12; color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 900px; display: grid;
            grid-template-columns: 1fr; gap: 20px; margin-top: 10px;
        }
        @media (min-width: 768px) {
            .container { grid-template-columns: 380px 1fr; }
        }
        .panel {
            background: #18181b; border: 1px solid #27272a;
            border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        h2, h3 { margin: 0; color: #fff; }
        .btn {
            background: #2563eb; color: #fff; border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #3f3f46; font-size: 12px; padding: 6px 12px; border-radius: 6px; }
        .btn-secondary:hover { background: #52525b; }
        .input-group { display: flex; flex-direction: column; gap: 5px; position: relative; }
        label { font-size: 11px; color: #a1a1aa; text-transform: uppercase; font-weight: 700; }
        .input-row { display: flex; gap: 5px; }
        input {
            background: #09090b; border: 1px solid #27272a; color: #fff;
            padding: 8px; border-radius: 6px; font-family: monospace; font-size: 12px; flex-grow: 1;
        }
        #qrcode {
            background: #fff; padding: 10px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            margin: 10px auto; width: 180px; height: 180px;
        }
        .video-box {
            background: #000; border-radius: 16px; overflow: hidden;
            border: 1px solid #27272a; aspect-ratio: 9 / 16; max-height: 80vh;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        video { width: 100%; height: 100%; object-fit: contain; }
        .status-badge {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6);
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
            backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
    </style>
</head>
<body>

    <h2>Control Panel</h2>
    <p style="color:#71717a; margin: 0 0 15px 0; font-size: 14px;">Трансляция экрана iOS через RTMP в WebRTC плеер</p>

    <div class="container">
        <div class="panel">
            <h3>1. Сканируй QR в Prism Live</h3>
            <div id="qrcode"></div>
            
            <div class="input-group">
                <label>Поток / RTMP URL</label>
                <div class="input-row">
                    <input type="text" id="rtmpUrl" value="rtmp://vdo.ninja:1935/live" readonly>
                    <button class="btn-secondary" onclick="copyText('rtmpUrl')">📋</button>
                </div>
            </div>

            <div class="input-group">
                <label>Ключ / Stream Key</label>
                <div class="input-row">
                    <input type="text" id="streamKey" readonly>
                    <button class="btn-secondary" onclick="copyText('streamKey')">📋</button>
                </div>
            </div>
            
            <hr style="border-color: #27272a; width: 100%; margin: 5px 0;">
            
            <h3>2. Просмотр</h3>
            <button class="btn" onclick="startPlayer()">▶️ Подключиться к экрану</button>
        </div>

        <div class="video-box">
            <div class="status-badge" id="statusText">Ожидание стрима...</div>
            <video id="remoteVideo" autoplay playsinline controls muted></video>
        </div>
    </div>

<script>
// Генерируем случайный ключ потока, чтобы никто не перехватил поток
const streamId = 'ios_screen_' + Math.random().toString(36).substring(2, 10);
document.getElementById('streamKey').value = streamId;

// Форматируем строку так, чтобы Prism Live автоматически распознал настройки при сканировании QR
const qrData = `rtmp://vdo.ninja:1935/live/${streamId}`;

// Создаем чистый QR код
new QRCode(document.getElementById("qrcode"), {
    text: qrData,
    width: 180,
    height: 180,
    colorDark : "#000000",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.M
});

function copyText(id) {
    const input = document.getElementById(id);
    input.select();
    document.execCommand('copy');
}

// Подключение к плееру (Поток забирается по WebRTC WHEP)
async function startPlayer() {
    const videoElement = document.getElementById('remoteVideo');
    const statusText = document.getElementById('statusText');
    statusText.innerText = "Подключение к медиасерверу...";

    const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    pc.ontrack = (event) => {
        if (event.streams && event.streams[0]) {
            videoElement.srcObject = event.streams[0];
            statusText.innerText = "🔴 ЭКРАН ТРАНСЛИРУЕТСЯ";
            statusText.style.color = "#ef4444";
        }
    };

    pc.addTransceiver('video', { direction: 'recvonly' });

    try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Запрашиваем WebRTC поток у сервера, куда Prism транслирует RTMP
        const response = await fetch(`https://vdo.ninja:8443/whep?streamid=${streamId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: offer.sdp
        });

        if (!response.ok) throw new Error('Поток еще не дошел до сервера');

        const answerSdp = await response.text();
        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answerSdp }));
        
    } catch (e) {
        console.error(e);
        statusText.innerText = "Сигнал не найден. Сначала запусти трансляцию на iPhone, подожди 3 сек и нажми кнопку снова.";
        statusText.style.color = "#f43f5e";
    }
}
</script>
</body>
</html>
