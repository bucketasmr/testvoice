<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intercontinental Rocket Tennis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; width: 100vw; height: 100vh; overflow: hidden; position: fixed; }
        
        /* Игровая зона */
        #gameContainer { position: relative; width: 100%; height: 65vh; background: #142214; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 16px; width: 90%; max-width: 340px; backdrop-filter: blur(10px); }
        button { background: #007aff; border: none; color: white; padding: 14px; font-size: 15px; margin: 8px 0; cursor: pointer; border-radius: 12px; width: 100%; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        button:active { filter: brightness(0.8); }
        #btnShare { background: #34c759; display: none; }
        
        #status { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 14px; z-index: 5; font-weight: 600; text-align: center; background: rgba(0,0,0,0.7); padding: 6px 14px; border-radius: 20px; pointer-events: none; }

        /* Зона Консоли */
        #consoleContainer { width: 100%; height: 35vh; background: #000; border-top: 2px solid #333; display: flex; flex-direction: column; }
        #consoleHeader { background: #1c1c1e; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2c2c2e; }
        #consoleHeader span { font-size: 12px; font-weight: bold; color: #ff9500; font-family: monospace; }
        .console-buttons { display: flex; gap: 8px; }
        .c-btn { background: #2c2c2e; padding: 6px 12px; font-size: 12px; border-radius: 6px; width: auto; margin: 0; color: #fff; }
        #consoleLog { flex: 1; padding: 8px; overflow-y: scroll; font-family: monospace; font-size: 11px; color: #00ff00; background: #050505; white-space: pre-wrap; word-break: break-all; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="gameContainer">
        <div id="status">Проверка гео-линка...</div>
        <div id="menu">
            <h2>Rocket Tennis</h2>
            <p style="font-size: 12px; color: #aaa; margin-bottom: 15px;">UA ⇄ USA Стабильный коннект</p>
            <button id="btnCreate">Создать матч (Хост)</button>
            <button id="btnShare">Поделиться инвайтом</button>
            <div id="joinSection" style="display: none;">
                <p style="font-size: 13px; margin-bottom: 8px; color: #34c759; font-weight: bold;">Вас пригласили по линку!</p>
                <button id="btnJoin" style="background: #34c759; margin: 0;">Вступить в бой</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="consoleContainer">
        <div id="consoleHeader">
            <span>DEV_CONSOLE v2.0 (LIVE TRAFFIC)</span>
            <div class="console-buttons">
                <button class="c-btn" id="btnClearLog">Очистить</button>
                <button class="c-btn" id="btnCopyLog" style="background: #007aff;">Копировать</button>
            </div>
        </div>
        <div id="consoleLog"></div>
    </div>

    <script src="multiplayer.js"></script>
    <script src="game.js"></script>
</body>
</html>
